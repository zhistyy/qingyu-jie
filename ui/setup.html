<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青云界 · 游戏准备</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="setup-container">
  <h2 class="setup-title">青云界 · 游戏准备</h2>

  <!-- 副标题 -->
  <div class="setup-subtitle-row">
    <span class="setup-subtitle">基底设置不可删除。添加扩展来丰富你的世界。</span>
    <span id="destiny-stones" style="color:#c4a45a;font-weight:700;font-size:.8rem">✦ 0 命石</span>
    <label class="setup-hide-toggle">
      <input type="checkbox" id="hide-base-toggle"> 只看自己创建的
    </label>
  </div>

  <!-- API Key -->
  <div class="setup-apikey-row">
    <label class="setup-apikey-label">DeepSeek API Key</label>
    <input type="password" id="apikey-input" class="setup-apikey-input"
      placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      autocomplete="off">
    <button id="btn-save-apikey" class="btn btn-sm" style="margin-left:4px">保存</button>
    <span id="apikey-status" class="setup-apikey-status"></span>
  </div>

  <!-- 加群提示 -->
  <div class="setup-qq-banner" onclick="navigator.clipboard?.writeText('924379820').then(()=>{const t=document.getElementById('qq-copy-tip');t.style.opacity='1';setTimeout(()=>t.style.opacity='0',1500)})">
    <span class="qq-icon">💬</span>
    <span class="qq-text">交流群 <strong>924379820</strong> — 加群领取 API Key 教程</span>
    <span class="qq-copy-hint">（点击复制群号）</span>
    <span id="qq-copy-tip" class="qq-copy-tip">✓ 已复制</span>
  </div>

  <!-- Tab 导航 -->
  <div class="setup-tabs-wrap">
    <div class="setup-tabs" id="setup-tabs">
      <button class="setup-tab active" data-tab="player">玩家</button>
      <button class="setup-tab" data-tab="loc">地点<span class="stab-cnt"></span></button>
      <button class="setup-tab" data-tab="char">角色<span class="stab-cnt"></span></button>
      <button class="setup-tab" data-tab="enm">敌人<span class="stab-cnt"></span></button>
      <button class="setup-tab" data-tab="faction">势力<span class="stab-cnt"></span></button>
      <button class="setup-tab" data-tab="res">资源<span class="stab-cnt"></span></button>
      <button class="setup-tab" data-tab="destiny">命石<span class="stab-cnt"></span></button>
      <button class="setup-tab" data-tab="save">存档<span class="stab-cnt"></span></button>
    </div>
    <div class="setup-tabs-arrow setup-tabs-arrow-left" id="tabs-arrow-l">◀</div>
    <div class="setup-tabs-arrow setup-tabs-arrow-right" id="tabs-arrow-r">▶</div>
  </div>

  <!-- 玩家页 -->
  <div class="setup-page active" id="sp-player" style="display:block">
    <p class="setup-page-desc">设定你在青云界中的身份。这些设定会在开始新游戏时生效。</p>
    <div class="player-form">
      <div class="pf-row">
        <label class="pf-label">姓名</label>
        <input type="text" id="pf-name" class="pf-input" value="" maxlength="8" placeholder="输入你的名字（如：林玄）">
      </div>
      <div class="pf-row">
        <label class="pf-label">称号</label>
        <input type="text" id="pf-title" class="pf-input" value="外门弟子" maxlength="12" placeholder="如：外门弟子">
      </div>
      <div class="pf-row">
        <label class="pf-label">所属势力</label>
        <select id="pf-faction" class="pf-select"></select>
      </div>
      <div class="pf-row">
        <label class="pf-label">出生地</label>
        <select id="pf-location" class="pf-select"></select>
      </div>
      <div class="pf-row">
        <label class="pf-label">身份层级</label>
        <select id="pf-klevel" class="pf-select"></select>
        <span id="pf-kcost" class="pf-cost"></span>
      </div>
      <div class="pf-row">
        <label class="pf-label">修为起点</label>
        <select id="pf-plevel" class="pf-select"></select>
        <span id="pf-pcost" class="pf-cost"></span>
      </div>
      <div class="pf-row">
        <label class="pf-label">角色类型</label>
        <select id="pf-charType" class="pf-select">
          <option value="修行者">修行者</option>
          <option value="凡人">凡人</option>
        </select>
      </div>
      <div class="pf-row">
        <label class="pf-label">世界流间隔</label>
        <input type="number" id="pf-wf-trigger" class="pf-input" value="5" min="1" max="50" style="width:80px" title="每N次交互后自动推进世界时间">
        <span style="font-size:.65rem;color:#8a8a7a;margin-left:8px">次交互后触发世界流</span>
      </div>
      <div class="pf-row">
        <label class="pf-label">初始物品</label>
        <div id="pf-inventory" class="pf-inventory"></div>
      </div>
    </div>
    <p class="setup-page-desc" style="margin-top:12px;font-size:.65rem;color:#8a8a7a">
      初始物品由身份层级决定。K0 杂役无灵石，K1 外门弟子 10 灵石 + 3 干粮。
    </p>
  </div>

  <!-- 地点页 -->
  <div class="setup-page" id="sp-loc">
    <div class="setup-page-header">
      <span class="setup-count">—</span>
      <button id="btn-add-loc" class="btn btn-sm">+ 添加地点</button>
    </div>
    <div id="setup-locations" class="setup-list"></div>
  </div>

  <!-- 角色页 -->
  <div class="setup-page" id="sp-char">
    <div class="setup-page-header">
      <span class="setup-count">—</span>
      <button id="btn-add-char" class="btn btn-sm">+ 添加角色</button>
    </div>
    <div id="setup-characters" class="setup-list"></div>
  </div>

  <!-- 敌人页 -->
  <div class="setup-page" id="sp-enm">
    <div class="setup-page-header">
      <span class="setup-count">—</span>
      <button id="btn-add-enm" class="btn btn-sm">+ 添加敌人</button>
    </div>
    <div id="setup-enemies" class="setup-list"></div>
  </div>

  <!-- 势力页 -->
  <div class="setup-page" id="sp-faction">
    <div class="setup-page-header">
      <span class="setup-count">—</span>
      <button id="btn-add-fac" class="btn btn-sm">+ 添加势力</button>
    </div>
    <div id="setup-factions" class="setup-list"></div>
  </div>

  <!-- 资源页 -->
  <div class="setup-page" id="sp-res">
    <div class="setup-page-header">
      <span class="setup-count">—</span>
      <button id="btn-add-res" class="btn btn-sm">+ 添加资源</button>
    </div>
    <div id="setup-resources" class="setup-list"></div>
  </div>

  <!-- 命石页 -->
  <div class="setup-page" id="sp-destiny">
    <p class="setup-page-desc" id="destiny-balance">命石余额：✦ 0</p>
    <p class="setup-page-desc" style="font-size:.7rem;color:#8a8a7a">命石是跨世界的 meta-currency。结束世界时结算获得，可在此处消耗来强化新世界的初始状态。</p>
    <div id="destiny-shop" class="setup-list"></div>
  </div>

  <!-- 存档页 -->
  <div class="setup-page" id="sp-save">
    <p class="setup-page-desc">选择存档加载或覆盖保存。共 20 个槽位，可自定义名称。</p>
    <div id="save-slots" class="save-slots-container"></div>
  </div>

  <!-- 添加弹窗 -->
  <div id="add-modal" class="add-modal-overlay" style="display:none">
    <div class="add-modal-box">
      <div class="add-modal-title" id="add-modal-title">添加</div>
      <div id="add-modal-body"></div>
      <div class="add-modal-actions">
        <button id="btn-add-confirm" class="btn btn-primary btn-sm">确认</button>
        <button id="btn-add-cancel" class="btn btn-sm btn-danger">取消</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div id="confirm-modal" class="add-modal-overlay" style="display:none">
    <div class="add-modal-box" style="text-align:center;max-width:360px">
      <div class="add-modal-title" id="confirm-modal-title"></div>
      <div class="add-modal-body" id="confirm-modal-body" style="font-size:.78rem;color:#6a6a5a;margin-bottom:8px"></div>
      <div class="add-modal-actions" style="justify-content:center">
        <button id="btn-confirm-ok" class="btn btn-primary btn-sm">确认</button>
        <button id="btn-confirm-cancel" class="btn btn-sm">取消</button>
      </div>
    </div>
  </div>

  <!-- 底部操作栏 -->
  <div class="setup-footer">
    <button id="btn-start-game" class="btn btn-primary">进入世界</button>
  </div>
</div>

<script type="module" src="setup.js"></script>
</body>
</html>
