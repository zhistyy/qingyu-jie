<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青云界</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-page">

  <!-- 顶部栏 -->
  <header id="topbar">
    <span class="title">青云界</span>
    <span id="location-display" class="location">山脚</span>
    <span id="time-display" class="time">—</span>
    <span id="wf-indicator" class="wf-indicator" title="世界流计数"></span>
    <button id="btn-save" class="btn" title="手动存档">保存</button>
    <button id="btn-end-world" class="btn btn-danger" title="结束世界并结算命石">结束</button>
  </header>

  <!-- 主体 -->
  <main id="main">
    <section id="narrative-area">

      <!-- 战斗 HUD -->
      <div id="combat-hud" class="combat-hud-hidden">
        <div style="flex:1">
          <span class="chud-label">你</span>
          <span id="chud-player-hp" class="chud-hp"></span>
          <div class="chud-bar"><div id="chud-player-bar" class="chud-fill chud-fill-green"></div></div>
        </div>
        <div style="flex:1">
          <span id="chud-enemy-name" class="chud-label">—</span>
          <span id="chud-enemy-hp" class="chud-hp"></span>
          <div class="chud-bar"><div id="chud-enemy-bar" class="chud-fill chud-fill-red"></div></div>
        </div>
      </div>

      <!-- 叙事历史 -->
      <div id="narrative-history"></div>

      <!-- 开篇剧情按钮 -->
      <div id="intro-prompt" class="intro-prompt" style="display:none">
        <p>万事俱备，等待冒险开始...</p>
        <button id="btn-intro" class="btn btn-primary">生成开篇剧情</button>
      </div>

      <!-- 底部面板 -->
      <div id="bottom-panel">
        <div class="bp-handle" id="bp-handle" title="点击切换面板">
          <span class="bp-handle-bar"></span>
        </div>
        <div id="bp-content"></div>
      </div>

      <!-- 面板导航条 -->
      <nav id="panel-nav">
        <button class="pnav-item" data-panel="self">自身</button>
        <button class="pnav-item" data-panel="map">地图</button>
        <a href="chat.html" class="pnav-item" style="text-decoration:none">角色</a>
        <button class="pnav-item" data-panel="factions">势力</button>
        <button class="pnav-item" data-panel="worldline">世界线</button>
        <button class="pnav-item" data-panel="backpack">背包</button>
        <button class="pnav-item apilog-link" onclick="location.href='api-log.html'">API</button>
        <button class="pnav-item" data-panel="changelog">日志</button>
      </nav>

      <!-- 输入区 -->
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="输入你想做的事，或 /命令 ..." autofocus>
        <button id="btn-send" class="btn">行动</button>
        <div id="send-spinner" class="send-spinner" style="display:none"><div class="ss-ring"></div></div>
      </div>
    </section>
  </main>

  <!-- 世界流进度弹窗 -->
  <div id="wf-progress" class="modal">
    <div class="modal-content wf-progress-content">
      <h2>世界流转中...</h2>
      <div id="wf-progress-body"></div>
    </div>
  </div>

  <!-- 结束世界结算弹窗 -->
  <div id="end-world-modal" class="modal">
    <div class="modal-content">
      <h2>世界终结</h2>
      <div id="end-world-body"></div>
      <button class="btn btn-primary" onclick="window._confirmEndWorld()" style="margin-top:16px">确认结束</button>
      <button class="btn" onclick="document.getElementById('end-world-modal').classList.remove('show')" style="margin-top:16px;margin-left:8px">继续冒险</button>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div id="confirm-modal" class="add-modal-overlay" style="display:none">
    <div class="add-modal-box" style="text-align:center;max-width:360px">
      <div class="add-modal-title" id="confirm-modal-title"></div>
      <div class="add-modal-body" id="confirm-modal-body" style="font-size:.78rem;color:#6a6a5a;margin-bottom:8px"></div>
      <div class="add-modal-actions" style="justify-content:center">
        <button id="btn-confirm-ok" class="btn btn-primary btn-sm">确认</button>
        <button id="btn-confirm-cancel" class="btn btn-sm">取消</button>
      </div>
    </div>
  </div>

  <!-- 世界流详情弹窗 -->
  <div id="wf-detail-modal" class="modal">
    <div class="modal-content wf-detail-content">
      <div id="wf-detail-body"></div>
      <button class="btn btn-primary" onclick="window._closeWfDetail()" style="margin-top:12px;width:100%">关闭</button>
    </div>
  </div>

</div>

<script type="module" src="game.js"></script>
</body>
</html>
